<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Y‑Plaza — Dashboard Agent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/style.css" />
</head>

<body class="layout">
  
<header>
  <nav class="nav" aria-label="Navigation principale">
    <div class="brand">
      <div class="brand__name">Y‑Plaza</div>
      <div class="brand__tag">Immobilier</div>
    </div>
    <div class="nav-links">
      <a class="nav-link" href="./index.html">Accueil</a>
      <a class="nav-link" href="./search.html">Recherche</a>
      
      <a class="nav-link" href="./dashboard-agent.html" id="nav-dashboard">Dashboard</a>
      <a class="nav-link" href="./admin.html" id="nav-admin">Admin</a>
      <a class="btn btn-primary" href="./login.html" id="nav-auth">Se connecter</a>
      <button class="btn btn-ghost" id="btn-logout" type="button">Déconnexion</button>
    
    </div>
  </nav>
</header>


  <main>
    <section class="hero" style="margin-bottom:18px;">
      <div class="hero__kicker">Espace agent</div>
      <h1 class="h1" style="margin-bottom:8px;">Dashboard</h1>
      <p class="lead" style="margin:0;">Publiez et gérez vos annonces.</p>
    </section>

    <div id="dashboard-error" class="alert alert-error" style="display:none" role="alert"></div>

    <section class="grid grid-2">
      <article class="card card-pad">
        <div style="display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;">
          <h2 class="section-title" style="margin:0;">Créer / Modifier un bien</h2>
          <span class="badge badge--gold">Publication</span>
        </div>
        <div class="hr"></div>

        <form id="property-form" class="form">
          <input type="hidden" id="property-id" name="id" />

          <div class="field">
            <label for="property-city">Ville</label>
            <input id="property-city" name="city" type="text" required />
          </div>

          <div class="grid grid-2" style="gap:12px;">
            <div class="field">
              <label for="property-price">Prix (€)</label>
              <input id="property-price" name="price" type="number" min="0" step="1000" required />
            </div>
            <div class="field">
              <label for="property-surface">Surface (m²)</label>
              <input id="property-surface" name="surface" type="number" min="0" step="1" />
            </div>
          </div>

          <div class="grid grid-2" style="gap:12px;">
            <div class="field">
              <label for="property-rooms">Pièces</label>
              <input id="property-rooms" name="rooms" type="number" min="0" step="1" />
            </div>
            <div class="field">
              <label for="property-status">Statut</label>
              <select id="property-status" name="status">
                <option value="available">Disponible</option>
                <option value="sold">Vendu</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="property-agency">Agence</label>
            <select id="property-agency" name="agency_id"></select>
          </div>

          <div class="field">
            <label for="property-description">Description</label>
            <textarea id="property-description" name="description" rows="5" placeholder="Description courte et réaliste…"></textarea>
          </div>

          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn btn-primary" type="submit" id="btn-save-property">Enregistrer</button>
            <button class="btn" type="button" id="btn-reset-form">Réinitialiser</button>
          </div>
        </form>
      </article>

      <article class="card card-pad">
        <div style="display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;">
          <h2 class="section-title" style="margin:0;">Mes biens</h2>
          <span class="badge">Liste</span>
        </div>
        <div class="hr"></div>

        <div id="my-properties-container" class="grid grid-2" aria-live="polite"></div>
      </article>
    </section>
  </main>

  <footer>
    &copy; <span id="footer-year"></span> Y‑Plaza — Projet Fil Rouge.
  </footer>

  <script src="./js/api.js" defer></script>
  <script src="./js/auth.js" defer></script>
  <script src="./js/ui.js" defer></script>
  <script src="./js/pages.dashboard-agent.js" defer></script>
</body>
</html>
