<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Y-Plaza — Détail</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/style.css" />
</head>

<body class="layout">

<header>
  <nav class="nav">
    <div class="brand">
      <div class="brand__mark">Y</div>
      <div>
        <div class="brand__name">Y-Plaza</div>
        <div class="brand__tag">Immobilier</div>
      </div>
    </div>

    <div class="nav-links">
      <a class="nav-link" href="./index.html">Accueil</a>
      <a class="nav-link" href="./search.html">Recherche</a>
      <a class="nav-link" href="./estimate.html">Estimer</a>

      <a class="nav-link" href="./dashboard-agent.html" id="nav-dashboard">Dashboard</a>
      <a class="nav-link" href="./admin.html" id="nav-admin">Admin</a>
      <a class="btn btn-primary" href="./login.html" id="nav-auth">Se connecter</a>
      <button class="btn btn-ghost" id="btn-logout" type="button">Déconnexion</button>
    </div>
  </nav>
</header>

<main>

  <section id="property-gallery" class="property-gallery" aria-label="Galerie du bien">
    <div class="property-gallery__main">
      <button class="property-gallery__nav property-gallery__nav--prev" id="gallery-prev" type="button" aria-label="Image précédente">&lsaquo;</button>
      <img id="property-gallery-image" src="./assets/properties/p2.jpg" alt="Photo du bien" />
      <button class="property-gallery__nav property-gallery__nav--next" id="gallery-next" type="button" aria-label="Image suivante">&rsaquo;</button>
      <div class="property-gallery__counter" id="gallery-counter">1/1</div>
    </div>
    <div class="property-gallery__thumbs" id="gallery-thumbs" aria-label="Miniatures"></div>
  </section>

  <div id="property-error" class="alert alert-error" style="display:none"></div>
  <div id="property-success" class="alert alert-success" style="display:none"></div>

  <section class="property-main">

    <div class="property-main__left">

      <div class="property-head">
        <h1 id="property-title" class="h1">Chargement...</h1>
        <p id="property-location" class="property-location"></p>
      </div>

      <div class="property-infos">
        <div class="info-box">
          <strong id="property-price">—</strong>
          <span>Prix</span>
        </div>

        <div class="info-box">
          <strong id="property-surface">—</strong>
          <span>Surface</span>
        </div>

        <div class="info-box">
          <strong id="property-rooms">—</strong>
          <span>Pièces</span>
        </div>

        <div class="info-box">
          <strong id="property-type">—</strong>
          <span>Type</span>
        </div>
      </div>

      <!-- DESCRIPTION -->
      <div class="property-section">
        <h2>Description</h2>
        <p id="property-description">
          Description du bien...
        </p>
      </div>

    </div>

    <aside class="property-main__right">

      <div class="property-card-side">

        <div class="property-price-big" id="property-price-big">—</div>
        <div class="agency-box">
          <div class="agency-box__label">Agence</div>
          <strong id="agency-name">Y-Plaza</strong>
          <p id="agency-details" class="small">Chargement des coordonnées...</p>
        </div>

        <form id="contact-form" class="form contact-form">
          <div class="field">
            <label for="contact-name">Nom</label>
            <input id="contact-name" type="text" autocomplete="name" required />
          </div>
          <div class="field">
            <label for="contact-email">Email</label>
            <input id="contact-email" type="email" autocomplete="email" required />
          </div>
          <div class="field">
            <label for="contact-message">Message</label>
            <textarea id="contact-message" rows="4" required>Bonjour, je souhaite obtenir plus d'informations sur ce bien.</textarea>
          </div>
          <button class="btn btn-primary" id="btn-contact-agency" type="submit">
            Contacter l'agence
          </button>
        </form>

        <button class="btn" id="btn-favorite" style="width:100%;">
          Ajouter aux favoris
        </button>

        <p class="small" id="favorite-hint" style="margin-top:10px;">
          Connectez-vous pour sauvegarder ce bien
        </p>

      </div>

    </aside>

  </section>

</main>

<footer>
  &copy; <span id="footer-year"></span> Y-Plaza
</footer>

<script src="./js/api.js" defer></script>
<script src="./js/auth.js" defer></script>
<script src="./js/ui.js" defer></script>
<script src="./js/pages.property.js" defer></script>

</body>
</html>
